# Normal Kubernetes Secret generated by --bootstrap from the SopsSecret above.
# This is what hydra creates directly when the sops-secrets-operator is not
# yet running, allowing the operator to pull its container image.
apiVersion: v1
kind: Secret
metadata:
  name: image-pull-secret
  namespace: sops-secrets-operator
type: kubernetes.io/dockerconfigjson
stringData:
  .dockerconfigjson: '{"auths":{"registry.example.com":{"username":"robot","password":"s3cret","auth":"cm9ib3Q6czNjcmV0"}}}'
