# Hydra user manual — static site (https://hydra-gitops.org/)
# Build from this directory: ./build.sh

site_name: Hydra User Manual
site_url: https://hydra-gitops.org/
site_description: Hydra GitOps CLI user manual
repo_url: https://github.com/hydra-gitops/hydra
repo_name: hydra-gitops/hydra
edit_uri: edit/main/hydra/docs/manual/

docs_dir: ../manual
site_dir: site

# Reload dev server when casts or site assets change (paths relative to this file).
watch:
  - ../asciinema/help
  - assets
  - stylesheets
  - javascripts
  - hydra_mkdocs

theme:
  name: material
  language: en
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - navigation.instant
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - toc.follow

plugins:
  - search
  - hydra_manual:
      asciinema_source: ../asciinema/help
      asciinema_site_path: asciinema/help

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

extra_css:
  - assets/asciinema-player/asciinema-player.css
  - stylesheets/extra.css

extra_javascript:
  - assets/asciinema-player/asciinema-player.min.js
  - javascripts/asciinema-embed.js
