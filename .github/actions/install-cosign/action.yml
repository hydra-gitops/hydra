name: Install cosign
description: Install a pinned cosign binary on the runner

runs:
  using: composite
  steps:
    - name: Install cosign
      uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      with:
        # Version managed by renovate.json customManagers.
        # renovate: datasource=github-releases depName=sigstore/cosign
        cosign-release: v3.0.6
      # cosign-installer installs to $HOME/.cosign by default and appends that
      # directory to GITHUB_PATH, so later workflow steps can invoke cosign directly.
