name: release

on:
  push:
    branches:
      - main

permissions:
  contents: write # checkout + push signed tags
  issues: write # semantic-release/github may comment on issues
  pull-requests: write # semantic-release/github may comment on PRs

jobs:
  release:
    name: Release
    environment: release
    runs-on: ubuntu-24.04

    if: "github.event.head_commit.author.name != 'Hydra Release'"

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install cosign
        uses: ./.github/actions/install-cosign

      - name: Install sops
        uses: ./.github/actions/install-sops

      - name: Run semantic-release with signed tags
        env:
          SOPS_AGE_KEY_RELEASE: ${{ secrets.SOPS_AGE_KEY_RELEASE }}
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
        run: ./scripts/semantic-release.sh

      - name: Dispatch publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="$(git tag --points-at HEAD | grep '^v' | sort -V | tail -n1 || true)"
          if [[ -z "${tag}" ]]; then
            echo "No new release tag found on HEAD; skipping dispatch"
            exit 0
          fi

          sha="$(git rev-list -n1 "${tag}")"
          echo "Dispatching publish for tag ${tag} at ${sha}"

          gh api repos/${{ github.repository }}/dispatches \
            --method POST \
            -f event_type=hydra_publish \
            -F client_payload[tag]="${tag}" \
            -F client_payload[sha]="${sha}"
