name: renovate

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: renovate
  cancel-in-progress: false

jobs:
  renovate:
    runs-on: ubuntu-latest
    container:
      image: renovate/renovate:43.198.0@sha256:69212333d87a8d23529f89a6d8c9c87a2d49e7ee76d4a4447815900218c15728
    env:
      GITHUB_REPOSITORY: ${{ github.repository }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      LOG_LEVEL: info
      RENOVATE_TOKEN: ${{ secrets.RENOVATE_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Renovate
        shell: bash
        run: |
          set -euo pipefail

          : "${RENOVATE_TOKEN:=${GITHUB_TOKEN:-}}"
          if [[ -z "${RENOVATE_TOKEN}" ]]; then
            echo "RENOVATE_TOKEN or GITHUB_TOKEN must be set" >&2
            exit 1
          fi

          if [[ -z "${GITHUB_REPOSITORY:-}" ]]; then
            echo "GITHUB_REPOSITORY must be set" >&2
            exit 1
          fi

          export LOG_LEVEL="${LOG_LEVEL:-info}"
          export RENOVATE_CONFIG_FILE="${RENOVATE_CONFIG_FILE:-${GITHUB_WORKSPACE}/renovate.json}"
          export RENOVATE_ENDPOINT="${RENOVATE_ENDPOINT:-https://api.github.com/}"
          export RENOVATE_PLATFORM="${RENOVATE_PLATFORM:-github}"
          export RENOVATE_TOKEN

          renovate "${GITHUB_REPOSITORY}"
