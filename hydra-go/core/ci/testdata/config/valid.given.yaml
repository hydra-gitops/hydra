# Valid .hydra-ci.yaml configuration with all fields
ci:
  rootAppsPath: "apps"
  environments:
    - dev
    - stage
    - prod
  appGroups:
    - name: demo
      path: apps/demo
    - name: cluster-infra
      path: apps/cluster-infra
  registry: "oci://ghcr.io/example-org/helm-charts"
  sign:
    helm:
      name: "Hydra CI <ci@example.com>"
      key: "0123456789ABCDEF0123456789ABCDEF01234567"
      publicKey: |
        -----BEGIN PGP PUBLIC KEY BLOCK-----
        example
        -----END PGP PUBLIC KEY BLOCK-----
  promote:
    promotableRootApps: []
  teams:
    webhookUrl: "https://teams.example.com/webhook"
