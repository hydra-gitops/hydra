# Built-in readiness for namespaced v1/Secret and v1/ConfigMap when they appear on the scale
# dependency graph: pass when the same resource id exists in the live cluster inventory.
ready:
  hydra-builtin-v1-Secret-and-ConfigMap-cluster:
    predicate: 'gvk == "v1/Secret" || gvk == "v1/ConfigMap"'
    cel:
      - 'size(clusterEntities({"id": id})) > 0 ? "" : "missing"'
