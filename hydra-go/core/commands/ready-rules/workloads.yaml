# Built-in global.hydra.ready rules for workload controllers (embedded; same shape as Helm values).
ready:
  hydra-builtin-apps-v1-Deployment:
    predicate: 'gvk == "apps/v1/Deployment"'
    cel:
      - '((has(entity.spec) && has(entity.spec.replicas)) ? int(entity.spec.replicas) : int(1)) > int(0) ? "" : "desired replica count is zero (scaled to zero; nothing scheduled)"'
      - '((has(entity.spec) && has(entity.spec.replicas)) ? int(entity.spec.replicas) : int(1)) > int(0) && has(entity.status.conditions) && entity.status.conditions.exists(c, c.type == "ReplicaFailure" && c.status == "True") ? "Deployment condition ReplicaFailure is True (pod create or delete failed)" : ""'
      - '((has(entity.spec) && has(entity.spec.replicas)) ? int(entity.spec.replicas) : int(1)) > int(0) && has(entity.status.conditions) && entity.status.conditions.exists(c, c.type == "Available" && (c.status == "False" || c.status == "Unknown")) ? "Deployment condition Available is not True (minimum availability not met)" : ""'
      - '((has(entity.spec) && has(entity.spec.replicas)) ? int(entity.spec.replicas) : int(1)) > int(0) && has(entity.status.conditions) && entity.status.conditions.exists(c, c.type == "Progressing" && c.status == "False") ? "Deployment condition Progressing is False (rollout stalled or progress deadline exceeded)" : ""'
      - '((has(entity.spec) && has(entity.spec.replicas)) ? int(entity.spec.replicas) : int(1)) > int(0) && has(entity.status.conditions) && entity.status.conditions.exists(c, (c.status == "False" || c.status == "Unknown") && c.type != "Available" && c.type != "Progressing" && c.type != "ReplicaFailure") ? "Deployment has a failing status condition of another type (see kubectl describe deployment)" : ""'
      - '((has(entity.spec) && has(entity.spec.replicas)) ? int(entity.spec.replicas) : int(1)) > int(0) ? (!has(entity.status) || !has(entity.status.readyReplicas) ? "status.readyReplicas missing while workload should be running" : int(entity.status.readyReplicas) >= ((has(entity.spec) && has(entity.spec.replicas)) ? int(entity.spec.replicas) : int(1)) ? "" : "readyReplicas " + string(int(entity.status.readyReplicas)) + " is below desired " + string((has(entity.spec) && has(entity.spec.replicas)) ? int(entity.spec.replicas) : int(1))) : ""'
      - '((has(entity.spec) && has(entity.spec.replicas)) ? int(entity.spec.replicas) : int(1)) > int(0) && has(entity.status) && has(entity.status.readyReplicas) && int(entity.status.readyReplicas) >= ((has(entity.spec) && has(entity.spec.replicas)) ? int(entity.spec.replicas) : int(1)) ? [] : involvedObjectEvents(10, kind, name, ns)'

  hydra-builtin-apps-v1-StatefulSet:
    predicate: 'gvk == "apps/v1/StatefulSet"'
    cel:
      - '((has(entity.spec) && has(entity.spec.replicas)) ? int(entity.spec.replicas) : int(1)) > int(0) ? "" : "desired replica count is zero (scaled to zero; nothing scheduled)"'
      - '((has(entity.spec) && has(entity.spec.replicas)) ? int(entity.spec.replicas) : int(1)) > int(0) && has(entity.status.conditions) && entity.status.conditions.exists(c, c.type == "ReplicaFailure" && c.status == "True") ? "StatefulSet condition ReplicaFailure is True (pod create or delete failed)" : ""'
      - '((has(entity.spec) && has(entity.spec.replicas)) ? int(entity.spec.replicas) : int(1)) > int(0) && has(entity.status.conditions) && entity.status.conditions.exists(c, c.type == "Available" && (c.status == "False" || c.status == "Unknown")) ? "StatefulSet condition Available is not True (minimum availability not met)" : ""'
      - '((has(entity.spec) && has(entity.spec.replicas)) ? int(entity.spec.replicas) : int(1)) > int(0) && has(entity.status.conditions) && entity.status.conditions.exists(c, c.type == "Progressing" && c.status == "False") ? "StatefulSet condition Progressing is False (rollout stalled or progress deadline exceeded)" : ""'
      - '((has(entity.spec) && has(entity.spec.replicas)) ? int(entity.spec.replicas) : int(1)) > int(0) && has(entity.status.conditions) && entity.status.conditions.exists(c, (c.status == "False" || c.status == "Unknown") && c.type != "Available" && c.type != "Progressing" && c.type != "ReplicaFailure") ? "StatefulSet has a failing status condition of another type (see kubectl describe statefulset)" : ""'
      - '((has(entity.spec) && has(entity.spec.replicas)) ? int(entity.spec.replicas) : int(1)) > int(0) ? (!has(entity.status) || !has(entity.status.readyReplicas) ? "status.readyReplicas missing while workload should be running" : int(entity.status.readyReplicas) >= ((has(entity.spec) && has(entity.spec.replicas)) ? int(entity.spec.replicas) : int(1)) ? "" : "readyReplicas " + string(int(entity.status.readyReplicas)) + " is below desired " + string((has(entity.spec) && has(entity.spec.replicas)) ? int(entity.spec.replicas) : int(1))) : ""'
      - '((has(entity.spec) && has(entity.spec.replicas)) ? int(entity.spec.replicas) : int(1)) > int(0) && has(entity.status) && has(entity.status.readyReplicas) && int(entity.status.readyReplicas) >= ((has(entity.spec) && has(entity.spec.replicas)) ? int(entity.spec.replicas) : int(1)) ? [] : involvedObjectEvents(10, kind, name, ns)'

  hydra-builtin-apps-v1-ReplicaSet:
    predicate: 'gvk == "apps/v1/ReplicaSet"'
    cel:
      - '((has(entity.spec) && has(entity.spec.replicas)) ? int(entity.spec.replicas) : int(1)) > int(0) ? "" : "desired replica count is zero (scaled to zero; nothing scheduled)"'
      - '((has(entity.spec) && has(entity.spec.replicas)) ? int(entity.spec.replicas) : int(1)) > int(0) && has(entity.status.conditions) && entity.status.conditions.exists(c, c.status == "False" || c.status == "Unknown") ? "ReplicaSet has a failing status condition (see kubectl describe replicaset)" : ""'
      - '((has(entity.spec) && has(entity.spec.replicas)) ? int(entity.spec.replicas) : int(1)) > int(0) ? (!has(entity.status) || !has(entity.status.readyReplicas) ? "status.readyReplicas missing while workload should be running" : int(entity.status.readyReplicas) >= ((has(entity.spec) && has(entity.spec.replicas)) ? int(entity.spec.replicas) : int(1)) ? "" : "readyReplicas " + string(int(entity.status.readyReplicas)) + " is below desired " + string((has(entity.spec) && has(entity.spec.replicas)) ? int(entity.spec.replicas) : int(1))) : ""'
      - '((has(entity.spec) && has(entity.spec.replicas)) ? int(entity.spec.replicas) : int(1)) > int(0) && has(entity.status) && has(entity.status.readyReplicas) && int(entity.status.readyReplicas) >= ((has(entity.spec) && has(entity.spec.replicas)) ? int(entity.spec.replicas) : int(1)) ? [] : involvedObjectEvents(10, kind, name, ns)'

  hydra-builtin-apps-v1-DaemonSet:
    predicate: 'gvk == "apps/v1/DaemonSet"'
    cel:
      - 'has(entity.status) && has(entity.status.desiredNumberScheduled) && int(entity.status.desiredNumberScheduled) > int(0) && has(entity.status.conditions) && entity.status.conditions.exists(c, c.type == "ReplicaFailure" && c.status == "True") ? "DaemonSet condition ReplicaFailure is True (pod create or delete failed)" : ""'
      - 'has(entity.status) && has(entity.status.desiredNumberScheduled) && int(entity.status.desiredNumberScheduled) > int(0) && has(entity.status.conditions) && entity.status.conditions.exists(c, c.type == "Available" && (c.status == "False" || c.status == "Unknown")) ? "DaemonSet condition Available is not True (minimum availability not met)" : ""'
      - 'has(entity.status) && has(entity.status.desiredNumberScheduled) && int(entity.status.desiredNumberScheduled) > int(0) && has(entity.status.conditions) && entity.status.conditions.exists(c, c.type == "Progressing" && c.status == "False") ? "DaemonSet condition Progressing is False (rollout stalled or progress deadline exceeded)" : ""'
      - 'has(entity.status) && has(entity.status.desiredNumberScheduled) && int(entity.status.desiredNumberScheduled) > int(0) && has(entity.status.conditions) && entity.status.conditions.exists(c, (c.status == "False" || c.status == "Unknown") && c.type != "Available" && c.type != "Progressing" && c.type != "ReplicaFailure") ? "DaemonSet has a failing status condition of another type (see kubectl describe daemonset)" : ""'
      - '!has(entity.status) || !has(entity.status.desiredNumberScheduled) || !has(entity.status.numberReady) ? "DaemonSet status missing desiredNumberScheduled or numberReady" : int(entity.status.desiredNumberScheduled) == int(0) || int(entity.status.numberReady) >= int(entity.status.desiredNumberScheduled) ? "" : "DaemonSet not ready: numberReady " + string(int(entity.status.numberReady)) + " is below desiredNumberScheduled " + string(int(entity.status.desiredNumberScheduled))'
      - '(!has(entity.status) || !has(entity.status.desiredNumberScheduled) || !has(entity.status.numberReady) || (int(entity.status.desiredNumberScheduled) != int(0) && int(entity.status.numberReady) < int(entity.status.desiredNumberScheduled))) ? involvedObjectEvents(10, kind, name, ns) : []'
