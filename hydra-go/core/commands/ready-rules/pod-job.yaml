# Built-in global.hydra.ready rules for Pod, Job, and CronJob (embedded; same shape as Helm values).
ready:
  hydra-builtin-v1-Pod:
    predicate: 'gvk == "v1/Pod"'
    cel:
      - 'has(entity.status.containerStatuses) && entity.status.containerStatuses.exists(cs, has(cs.state) && has(cs.state.waiting) && cs.state.waiting.reason == "CreateContainerConfigError") ? "container config error (check secret, configmap, or volume mounts)" : ""'
      - 'has(entity.status.containerStatuses) && entity.status.containerStatuses.exists(cs, has(cs.state) && has(cs.state.waiting) && cs.state.waiting.reason == "ImagePullBackOff") ? "image pull failed (ImagePullBackOff)" : ""'
      - 'has(entity.status.containerStatuses) && entity.status.containerStatuses.exists(cs, has(cs.state) && has(cs.state.waiting) && cs.state.waiting.reason == "ErrImagePull") ? "image pull failed (ErrImagePull)" : ""'
      - 'has(entity.status.containerStatuses) && entity.status.containerStatuses.exists(cs, has(cs.state) && has(cs.state.waiting) && cs.state.waiting.reason == "CrashLoopBackOff") ? "container crash loop (CrashLoopBackOff)" : ""'
      - '(has(entity.status.phase) && (entity.status.phase == "Pending" || entity.status.phase == "Running")) && has(entity.status.conditions) && entity.status.conditions.exists(c, c.type == "PodScheduled" && (c.status == "False" || c.status == "Unknown")) ? "pod condition PodScheduled is not True (not assigned to a node)" : ""'
      - '(has(entity.status.phase) && (entity.status.phase == "Pending" || entity.status.phase == "Running")) && has(entity.status.conditions) && entity.status.conditions.exists(c, c.type == "Initialized" && (c.status == "False" || c.status == "Unknown")) ? "pod condition Initialized is not True (init containers not finished)" : ""'
      - '(has(entity.status.phase) && (entity.status.phase == "Pending" || entity.status.phase == "Running")) && has(entity.status.conditions) && entity.status.conditions.exists(c, c.type == "ContainersReady" && (c.status == "False" || c.status == "Unknown")) ? "pod condition ContainersReady is not True (containers are not ready)" : ""'
      - '(has(entity.status.phase) && (entity.status.phase == "Pending" || entity.status.phase == "Running")) && has(entity.status.conditions) && entity.status.conditions.exists(c, c.type == "Ready" && (c.status == "False" || c.status == "Unknown")) ? "pod condition Ready is not True (not ready to serve traffic)" : ""'
      - '(has(entity.status.phase) && (entity.status.phase == "Pending" || entity.status.phase == "Running")) && has(entity.status.conditions) && entity.status.conditions.exists(c, c.type == "PodReadyToStartContainers" && (c.status == "False" || c.status == "Unknown")) ? "pod condition PodReadyToStartContainers is not True (kubelet not ready to start containers)" : ""'
      - '(has(entity.status.phase) && (entity.status.phase == "Pending" || entity.status.phase == "Running")) && has(entity.status.conditions) && entity.status.conditions.exists(c, c.type == "DisruptionTarget" && c.status == "True") ? "pod condition DisruptionTarget is True (marked for eviction or disruption)" : ""'
      - '(has(entity.status.phase) && (entity.status.phase == "Pending" || entity.status.phase == "Running")) && has(entity.status.conditions) && entity.status.conditions.exists(c, (c.status == "False" || c.status == "Unknown") && c.type != "PodScheduled" && c.type != "Initialized" && c.type != "ContainersReady" && c.type != "Ready" && c.type != "PodReadyToStartContainers" && c.type != "DisruptionTarget") ? "pod has a failing status condition of another type (see kubectl describe pod for condition type and message)" : ""'
      - 'has(entity.status.phase) && entity.status.phase == "Succeeded" ? "" : has(entity.status.phase) && entity.status.phase == "Failed" ? "pod failed" : has(entity.status.phase) && entity.status.phase == "Pending" ? "pod has not started (phase Pending)" : has(entity.status.phase) && entity.status.phase == "Running" && has(entity.status.conditions) && entity.status.conditions.exists(c, c.type == "Ready" && c.status == "True") ? "" : has(entity.status.phase) && entity.status.phase == "Running" && (!has(entity.status.conditions) || !entity.status.conditions.exists(c, c.type == "Ready")) ? "pod Running but Ready condition missing from status" : has(entity.status.phase) && entity.status.phase == "Running" ? "" : has(entity.status.phase) ? "pod phase " + string(entity.status.phase) + " is not ready" : "pod phase missing or not ready"'
      - '(has(entity.status.phase) && entity.status.phase == "Succeeded") || (has(entity.status.phase) && entity.status.phase == "Running" && has(entity.status.conditions) && entity.status.conditions.exists(c, c.type == "Ready" && c.status == "True")) ? [] : involvedObjectEvents(10, kind, name, ns)'

  hydra-builtin-batch-v1-Job:
    predicate: 'gvk == "batch/v1/Job"'
    cel:
      # Terminal failure: surface API condition reason (error code) and message; explicit note that the Job will not retry.
      - '(!has(entity.status) || !has(entity.status.conditions) || !entity.status.conditions.exists(c, c.type == "Failed" && c.status == "True")) ? "" : ((has(entity.status.conditions.filter(c, c.type == "Failed" && c.status == "True")[0].message) && string(entity.status.conditions.filter(c, c.type == "Failed" && c.status == "True")[0].message).size() > 0) && (has(entity.status.conditions.filter(c, c.type == "Failed" && c.status == "True")[0].reason) && string(entity.status.conditions.filter(c, c.type == "Failed" && c.status == "True")[0].reason).size() > 0) ? "job failed [reason=" + string(entity.status.conditions.filter(c, c.type == "Failed" && c.status == "True")[0].reason) + "]: " + string(entity.status.conditions.filter(c, c.type == "Failed" && c.status == "True")[0].message) + " (terminal; not auto-restarted; delete Job or re-sync release to retry)" : (has(entity.status.conditions.filter(c, c.type == "Failed" && c.status == "True")[0].message) && string(entity.status.conditions.filter(c, c.type == "Failed" && c.status == "True")[0].message).size() > 0) ? "job failed: " + string(entity.status.conditions.filter(c, c.type == "Failed" && c.status == "True")[0].message) + " (terminal; not auto-restarted; delete Job or re-sync release to retry)" : (has(entity.status.conditions.filter(c, c.type == "Failed" && c.status == "True")[0].reason) && string(entity.status.conditions.filter(c, c.type == "Failed" && c.status == "True")[0].reason).size() > 0) ? "job failed [reason=" + string(entity.status.conditions.filter(c, c.type == "Failed" && c.status == "True")[0].reason) + "] (terminal; not auto-restarted; delete Job or re-sync release to retry)" : "job failed (terminal; not auto-restarted; delete Job or re-sync release to retry)")'
      # FailureTarget (e.g. backoff): surface reason/message before Failed=True is written.
      - '(!has(entity.status) || !has(entity.status.conditions) || entity.status.conditions.exists(c, c.type == "Failed" && c.status == "True") || !entity.status.conditions.exists(c, c.type == "FailureTarget" && c.status == "True")) ? "" : ((has(entity.status.conditions.filter(c, c.type == "FailureTarget" && c.status == "True")[0].message) && string(entity.status.conditions.filter(c, c.type == "FailureTarget" && c.status == "True")[0].message).size() > 0) && (has(entity.status.conditions.filter(c, c.type == "FailureTarget" && c.status == "True")[0].reason) && string(entity.status.conditions.filter(c, c.type == "FailureTarget" && c.status == "True")[0].reason).size() > 0) ? "job failed [reason=" + string(entity.status.conditions.filter(c, c.type == "FailureTarget" && c.status == "True")[0].reason) + "]: " + string(entity.status.conditions.filter(c, c.type == "FailureTarget" && c.status == "True")[0].message) : (has(entity.status.conditions.filter(c, c.type == "FailureTarget" && c.status == "True")[0].message) && string(entity.status.conditions.filter(c, c.type == "FailureTarget" && c.status == "True")[0].message).size() > 0) ? "job failed: " + string(entity.status.conditions.filter(c, c.type == "FailureTarget" && c.status == "True")[0].message) : (has(entity.status.conditions.filter(c, c.type == "FailureTarget" && c.status == "True")[0].reason) && string(entity.status.conditions.filter(c, c.type == "FailureTarget" && c.status == "True")[0].reason).size() > 0) ? "job failed [reason=" + string(entity.status.conditions.filter(c, c.type == "FailureTarget" && c.status == "True")[0].reason) + "]" : "job failed")'
      - '((has(entity.status) && has(entity.status.conditions) && entity.status.conditions.exists(c, c.type == "Failed" && c.status == "True")) || (has(entity.status) && has(entity.status.conditions) && entity.status.conditions.exists(c, c.type == "Complete" && c.status == "True")) || (has(entity.status) && has(entity.status.succeeded) && int(entity.status.succeeded) >= ((has(entity.spec) && has(entity.spec.completions)) ? int(entity.spec.completions) : int(1)))) ? "" : "job not complete (succeeded " + (has(entity.status) && has(entity.status.succeeded) ? string(int(entity.status.succeeded)) : "0") + " of " + string((has(entity.spec) && has(entity.spec.completions)) ? int(entity.spec.completions) : int(1)) + ")"'
      - '(has(entity.status) && has(entity.status.conditions) && entity.status.conditions.exists(c, (c.type == "Failed" || c.type == "FailureTarget") && c.status == "True")) || !((has(entity.status) && has(entity.status.conditions) && entity.status.conditions.exists(c, c.type == "Complete" && c.status == "True")) || (has(entity.status) && has(entity.status.succeeded) && int(entity.status.succeeded) >= ((has(entity.spec) && has(entity.spec.completions)) ? int(entity.spec.completions) : int(1)))) ? involvedObjectEvents(10, kind, name, ns) : []'

  hydra-builtin-batch-v1-CronJob:
    predicate: 'gvk == "batch/v1/CronJob"'
    cel:
      - 'has(entity.spec) && has(entity.spec.suspend) && entity.spec.suspend == true ? "CronJob is suspended (spec.suspend true; no new Jobs will be scheduled)" : ""'
      - 'has(entity.spec) && has(entity.spec.suspend) && entity.spec.suspend == true ? involvedObjectEvents(10, kind, name, ns) : []'
