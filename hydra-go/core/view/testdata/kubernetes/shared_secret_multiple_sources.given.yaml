# Test: Secret with multiple incoming refs
# The Secret is referenced by 3 Deployments
# deployment-a: only 1 outgoing ref (to the Secret)
# deployment-b: 2 outgoing refs (Secret + ConfigMap)
# deployment-c: 2 outgoing refs (Secret + ConfigMap)
---
apiVersion: v1
kind: Secret
metadata:
  name: shared-secret
  namespace: default
data:
  password: cGFzc3dvcmQ=
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: config-b
  namespace: default
data:
  key: value-b
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: config-c
  namespace: default
data:
  key: value-c
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: deployment-a
  namespace: default
spec:
  template:
    spec:
      containers:
        - name: app
          env:
            - name: SECRET
              valueFrom:
                secretKeyRef:
                  name: shared-secret
                  key: password
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: deployment-b
  namespace: default
spec:
  template:
    spec:
      containers:
        - name: app
          env:
            - name: SECRET
              valueFrom:
                secretKeyRef:
                  name: shared-secret
                  key: password
          envFrom:
            - configMapRef:
                name: config-b
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: deployment-c
  namespace: default
spec:
  template:
    spec:
      containers:
        - name: app
          env:
            - name: SECRET
              valueFrom:
                secretKeyRef:
                  name: shared-secret
                  key: password
          envFrom:
            - configMapRef:
                name: config-c
