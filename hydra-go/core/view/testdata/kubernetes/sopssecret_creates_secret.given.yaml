# Test: SopsSecret creates a Secret that is referenced by a Deployment.
# The SopsSecret-produced secret should NOT get "app:missing" but "controller:sops-secrets-operator".
# The secret keys from the SopsSecret should be propagated to the missing Secret entity.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-app
  namespace: default
spec:
  template:
    spec:
      containers:
        - name: app
          envFrom:
            - secretRef:
                name: my-secret
---
apiVersion: isindir.github.com/v1alpha3
kind: SopsSecret
metadata:
  name: my-secret
  namespace: default
spec:
  secretTemplates:
    - name: my-secret
      stringData:
        DB_PASSWORD: "encrypted-value"
        API_KEY: "encrypted-key"
