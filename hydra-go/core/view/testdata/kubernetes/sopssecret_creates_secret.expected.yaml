entities:
    - id: apps/v1/Deployment/default/my-app
      templatePath: unknown-2.yaml
      templateIndex: 1
    - id: isindir.github.com/v1alpha3/SopsSecret/default/my-secret
      templatePath: unknown-3.yaml
      templateIndex: 1
    - id: v1/Namespace//default
      tags:
        - app:missing
    - id: v1/Secret/default/my-secret
      appIds:
        - prod.cluster-infra.sops-secrets-operator
      tags:
        - app:prod.cluster-infra.sops-secrets-operator
        - controller:sops-secrets-operator
      manifestPath: prod.cluster-infra.sops-secrets-operator/(core)/v1/Secret/default/my-secret.yaml
      secretKeys:
        - API_KEY
        - DB_PASSWORD
groups:
    - name: my-app (Deployment)
      ids:
        - apps/v1/Deployment/default/my-app
        - isindir.github.com/v1alpha3/SopsSecret/default/my-secret
        - v1/Namespace//default
        - v1/Secret/default/my-secret
references:
    - from: apps/v1/Deployment/default/my-app
      to: v1/Namespace//default
      labels:
        - namespace
      attributes:
        - origin:source: template
    - from: apps/v1/Deployment/default/my-app
      to: v1/Secret/default/my-secret
      labels:
        - envFrom
      attributes:
        - origin:source: template
    - from: isindir.github.com/v1alpha3/SopsSecret/default/my-secret
      to: v1/Namespace//default
      labels:
        - namespace
      attributes:
        - origin:source: template
    - from: isindir.github.com/v1alpha3/SopsSecret/default/my-secret
      to: v1/Secret/default/my-secret
      labels:
        - sops
      attributes:
        - origin:app: prod.cluster-infra.sops-secrets-operator
        - origin:generated: controller
        - origin:source: template
        - origin:workload: sops-secrets-operator
      reverse: true
    - from: v1/Secret/default/my-secret
      to: v1/Namespace//default
      labels:
        - namespace
      attributes:
        - origin:source: template
