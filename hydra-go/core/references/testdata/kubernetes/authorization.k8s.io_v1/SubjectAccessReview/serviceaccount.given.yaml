# Golden: SAR.spec.user as system:serviceaccount:ns:name → outgoing ref to that ServiceAccount.
# Expected label on that edge is "serviceAccount" (same convention as Deployment/Job→SA), not "user".
apiVersion: authorization.k8s.io/v1
kind: SubjectAccessReview
metadata:
  name: check-pod-access
spec:
  user: "system:serviceaccount:default:my-sa"
  resourceAttributes:
    namespace: default
    verb: get
    resource: pods
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: my-sa
  namespace: default
