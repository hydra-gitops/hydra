apiVersion: batch/v1
kind: Job
metadata:
  name: my-job
  namespace: default
spec:
  template:
    metadata:
      labels:
        app: my-app
    spec:
      initContainers:
        - name: init
          image: busybox
          envFrom:
            - configMapRef:
                name: init-config
      containers:
        - name: app
          image: busybox
          command: ["echo", "hello"]
      restartPolicy: Never
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: init-config
  namespace: default
data:
  KEY: value
