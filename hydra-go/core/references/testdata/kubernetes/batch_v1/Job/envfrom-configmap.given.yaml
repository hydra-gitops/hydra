apiVersion: batch/v1
kind: Job
metadata:
  name: my-job
  namespace: default
spec:
  template:
    spec:
      containers:
        - name: app
          image: busybox
          command: ["echo", "hello"]
          envFrom:
            - configMapRef:
                name: my-config
      restartPolicy: Never
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: my-config
  namespace: default
data:
  KEY: value
