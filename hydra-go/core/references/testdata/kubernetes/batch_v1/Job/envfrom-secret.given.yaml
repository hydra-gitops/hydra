apiVersion: batch/v1
kind: Job
metadata:
  name: my-job
  namespace: default
spec:
  template:
    spec:
      containers:
        - name: app
          image: busybox
          command: ["echo", "hello"]
          envFrom:
            - secretRef:
                name: my-secret
      restartPolicy: Never
---
apiVersion: v1
kind: Secret
metadata:
  name: my-secret
  namespace: default
data:
  PASSWORD: cGFzc3dvcmQ=
