apiVersion: batch/v1
kind: Job
metadata:
  name: my-job
  namespace: default
spec:
  template:
    spec:
      serviceAccountName: my-sa
      containers:
        - name: app
          image: busybox
          command: ["echo", "hello"]
      restartPolicy: Never
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: my-sa
  namespace: default
