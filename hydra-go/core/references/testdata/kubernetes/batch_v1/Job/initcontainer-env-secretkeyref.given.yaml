apiVersion: batch/v1
kind: Job
metadata:
  name: my-job
  namespace: default
spec:
  template:
    metadata:
      labels:
        app: my-app
    spec:
      initContainers:
        - name: init
          image: busybox
          env:
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: init-secret
                  key: password
      containers:
        - name: app
          image: busybox
          command: ["echo", "hello"]
      restartPolicy: Never
---
apiVersion: v1
kind: Secret
metadata:
  name: init-secret
  namespace: default
type: Opaque
data:
  password: cGFzc3dvcmQ=
