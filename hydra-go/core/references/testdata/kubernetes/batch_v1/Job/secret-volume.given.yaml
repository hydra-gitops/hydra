apiVersion: batch/v1
kind: Job
metadata:
  name: my-job
  namespace: default
spec:
  template:
    spec:
      containers:
        - name: app
          image: busybox
          command: ["echo", "hello"]
          volumeMounts:
            - name: secret-vol
              mountPath: /etc/secret
      restartPolicy: Never
      volumes:
        - name: secret-vol
          secret:
            secretName: my-secret
---
apiVersion: v1
kind: Secret
metadata:
  name: my-secret
  namespace: default
data:
  password: cGFzc3dvcmQ=
