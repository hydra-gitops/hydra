apiVersion: batch/v1
kind: CronJob
metadata:
  name: my-cronjob
  namespace: default
spec:
  schedule: "*/5 * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: my-sa
          containers:
            - name: app
              image: busybox
              command: ["echo", "hello"]
          restartPolicy: Never
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: my-sa
  namespace: default
