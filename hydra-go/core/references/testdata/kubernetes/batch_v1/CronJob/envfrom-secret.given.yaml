apiVersion: batch/v1
kind: CronJob
metadata:
  name: my-cronjob
  namespace: default
spec:
  schedule: "0 0 * * *"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: app
              image: busybox
              command: ["echo", "hello"]
              envFrom:
                - secretRef:
                    name: my-secret
          restartPolicy: Never
---
apiVersion: v1
kind: Secret
metadata:
  name: my-secret
  namespace: default
data:
  PASSWORD: cGFzc3dvcmQ=
