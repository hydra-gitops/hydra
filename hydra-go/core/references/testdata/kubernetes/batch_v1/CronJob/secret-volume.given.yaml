apiVersion: batch/v1
kind: CronJob
metadata:
  name: my-cronjob
  namespace: default
spec:
  schedule: "0 0 * * *"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: app
              image: busybox
              command: ["echo", "hello"]
              volumeMounts:
                - name: secret-vol
                  mountPath: /etc/secret
          restartPolicy: Never
          volumes:
            - name: secret-vol
              secret:
                secretName: my-secret
---
apiVersion: v1
kind: Secret
metadata:
  name: my-secret
  namespace: default
data:
  password: cGFzc3dvcmQ=
