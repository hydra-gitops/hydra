apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: multi-sa-cluster-binding
subjects:
  - kind: ServiceAccount
    name: sa-one
    namespace: default
  - kind: ServiceAccount
    name: sa-two
    namespace: kube-system
  - kind: Group
    name: system:masters
    apiGroup: rbac.authorization.k8s.io
  - kind: User
    name: admin
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: cluster-admin
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cluster-admin
rules:
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["*"]
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sa-one
  namespace: default
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sa-two
  namespace: kube-system
