apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: multi-sa-binding
  namespace: default
subjects:
  - kind: ServiceAccount
    name: sa-one
    namespace: default
  - kind: ServiceAccount
    name: sa-two
    namespace: other-ns
  - kind: Group
    name: developers
    apiGroup: rbac.authorization.k8s.io
  - kind: User
    name: jane
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: pod-reader
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pod-reader
  namespace: default
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sa-one
  namespace: default
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sa-two
  namespace: other-ns
