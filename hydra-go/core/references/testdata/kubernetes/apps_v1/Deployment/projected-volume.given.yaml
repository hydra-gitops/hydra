apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-deployment
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: my-app
  template:
    metadata:
      labels:
        app: my-app
    spec:
      containers:
        - name: app
          image: nginx
          volumeMounts:
            - name: projected-vol
              mountPath: /etc/projected
      volumes:
        - name: projected-vol
          projected:
            sources:
              - configMap:
                  name: my-config
              - secret:
                  name: my-secret
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: my-config
  namespace: default
data:
  config.yaml: "key: value"
---
apiVersion: v1
kind: Secret
metadata:
  name: my-secret
  namespace: default
data:
  secret.yaml: c2VjcmV0OiB2YWx1ZQ==
