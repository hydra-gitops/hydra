apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: my-sts
  namespace: default
spec:
  replicas: 1
  serviceName: my-service
  selector:
    matchLabels:
      app: my-app
  template:
    metadata:
      labels:
        app: my-app
    spec:
      initContainers:
        - name: init
          image: busybox
          envFrom:
            - configMapRef:
                name: init-config
      containers:
        - name: app
          image: nginx
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: init-config
  namespace: default
data:
  KEY: value
