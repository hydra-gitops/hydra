apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: my-statefulset
  namespace: default
spec:
  serviceName: my-service
  replicas: 1
  selector:
    matchLabels:
      app: my-app
  template:
    metadata:
      labels:
        app: my-app
    spec:
      containers:
        - name: app
          image: nginx
          envFrom:
            - secretRef:
                name: my-secret
---
apiVersion: v1
kind: Secret
metadata:
  name: my-secret
  namespace: default
data:
  PASSWORD: cGFzc3dvcmQ=
