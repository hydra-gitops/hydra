# volumeClaimTemplates with storageClassName: null must not call id() with null (default StorageClass).
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: my-statefulset-null-sc
  namespace: default
spec:
  serviceName: my-service
  replicas: 1
  selector:
    matchLabels:
      app: my-app
  template:
    metadata:
      labels:
        app: my-app
    spec:
      containers:
        - name: app
          image: nginx
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi
        storageClassName: null
