apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: my-replicaset
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: my-app
  template:
    metadata:
      labels:
        app: my-app
    spec:
      serviceAccountName: my-sa
      containers:
        - name: app
          image: nginx
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: my-sa
  namespace: default
