apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: my-ds
  namespace: default
spec:
  selector:
    matchLabels:
      app: my-app
  template:
    metadata:
      labels:
        app: my-app
    spec:
      initContainers:
        - name: init
          image: busybox
          env:
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: init-secret
                  key: password
      containers:
        - name: app
          image: nginx
---
apiVersion: v1
kind: Secret
metadata:
  name: init-secret
  namespace: default
type: Opaque
data:
  password: cGFzc3dvcmQ=
