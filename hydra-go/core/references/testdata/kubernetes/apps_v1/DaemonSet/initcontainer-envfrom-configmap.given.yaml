apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: my-ds
  namespace: default
spec:
  selector:
    matchLabels:
      app: my-app
  template:
    metadata:
      labels:
        app: my-app
    spec:
      initContainers:
        - name: init
          image: busybox
          envFrom:
            - configMapRef:
                name: init-config
      containers:
        - name: app
          image: nginx
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: init-config
  namespace: default
data:
  KEY: value
