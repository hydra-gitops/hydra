apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: my-daemonset
  namespace: default
spec:
  selector:
    matchLabels:
      app: my-app
  template:
    metadata:
      labels:
        app: my-app
    spec:
      serviceAccountName: my-sa
      containers:
        - name: app
          image: nginx
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: my-sa
  namespace: default
