apiVersion: v1
kind: Pod
metadata:
  name: test-pod
  namespace: default
spec:
  initContainers:
    - name: init
      image: busybox
      env:
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: init-secret
              key: password
  containers:
    - name: app
      image: nginx
---
apiVersion: v1
kind: Secret
metadata:
  name: init-secret
  namespace: default
type: Opaque
data:
  password: cGFzc3dvcmQ=
