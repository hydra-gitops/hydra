apiVersion: v1
kind: Pod
metadata:
  name: my-pod
  namespace: default
  labels:
    app: my-app
    tier: frontend
spec:
  containers:
    - name: main
      image: nginx
---
apiVersion: v1
kind: Service
metadata:
  name: my-service
  namespace: default
spec:
  selector:
    app: my-app
  ports:
    - port: 80
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: other-service
  namespace: default
spec:
  selector:
    app: other-app
  ports:
    - port: 80
      targetPort: 8080
