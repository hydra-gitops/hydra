apiVersion: v1
kind: Pod
metadata:
  name: test-pod
  namespace: default
spec:
  initContainers:
    - name: init
      image: busybox
      envFrom:
        - configMapRef:
            name: init-config
  containers:
    - name: app
      image: nginx
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: init-config
  namespace: default
data:
  KEY: value
