apiVersion: v1
kind: ReplicationController
metadata:
  name: my-rc
  namespace: default
spec:
  replicas: 1
  selector:
    app: my-app
  template:
    metadata:
      labels:
        app: my-app
    spec:
      serviceAccountName: my-sa
      containers:
        - name: app
          image: nginx
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: my-sa
  namespace: default
