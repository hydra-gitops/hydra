apiVersion: v1
kind: ServiceAccount
metadata:
  name: test-sa-secrets
  namespace: default
secrets:
  - name: sa-token-secret
  - name: sa-custom-secret
---
apiVersion: v1
kind: Secret
metadata:
  name: sa-token-secret
  namespace: default
type: kubernetes.io/service-account-token
---
apiVersion: v1
kind: Secret
metadata:
  name: sa-custom-secret
  namespace: default
type: Opaque
