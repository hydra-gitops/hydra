refDefinitions:
    - owner: v1/Secret/argocd/repo-secret
      type: direct
      direction: incoming
      endpoint:
        type: argocd.argoproj.io/repository
        value: git@github.com:some/repo.git
    - owner: v1/Secret/argocd/repo-secret
      type: direct
      direction: incoming
      endpoint:
        type: id
        value: v1/Secret/argocd/repo-secret
    - owner: v1/Secret/argocd/repo-secret
      type: direct
      direction: outgoing
      endpoint:
        type: id
        value: v1/Namespace//argocd
      label: namespace
refs:
    - refType: direct
      endpointType: id
      from: v1/Secret/argocd/repo-secret
      to: v1/Namespace//argocd
      labels:
        - namespace
      attributes:
        - origin:source: test
