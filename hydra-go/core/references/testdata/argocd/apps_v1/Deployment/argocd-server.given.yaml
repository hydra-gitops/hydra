apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: argocd
  name: argocd-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: argocd-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: argocd-server
    spec:
      containers:
        - name: argocd-server
          image: quay.io/argoproj/argocd:v2.10.0
---
apiVersion: v1
kind: ConfigMap
metadata:
  namespace: argocd
  name: argocd-rbac-cm
data:
  policy.csv: ""
---
apiVersion: v1
kind: Secret
metadata:
  namespace: argocd
  name: argocd-secret
type: Opaque
data:
  server.secretkey: some-very-secret-key
