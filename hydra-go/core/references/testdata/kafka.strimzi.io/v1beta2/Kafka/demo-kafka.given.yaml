apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  namespace: demo
  name: demo-kafka
spec:
  kafka:
    replicas: 3
    listeners:
      - name: plain
        port: 9092
        type: internal
---
apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: demo-infra
  name: strimzi-cluster-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      name: strimzi-cluster-operator
  template:
    metadata:
      labels:
        name: strimzi-cluster-operator
    spec:
      containers:
        - name: strimzi-cluster-operator
          image: quay.io/strimzi/operator:0.40.0
