ref-parsers:
  # Kyverno clone-source rule
  - predicate: 'gvk == "v1/Secret" && name == "image-pull-secret" && ns != "sops-secrets-operator"'
    attributes:
      - "origin:app": prod.cluster-infra.kyverno
      - "origin:workload": kyverno-background-controller
      - "origin:generated": controller
    pick:
      - cel: '[refBuilder().outgoing(id("v1/Secret", "sops-secrets-operator", "image-pull-secret"))]'
        label: clone-source
  # SopsSecret rules (needed because SopsSecret entities are in the given.yaml)
  - predicate: 'gvk == "isindir.github.com/v1alpha3/SopsSecret"'
    attributes:
      - "origin:app": prod.cluster-infra.sops-secrets-operator
      - "origin:workload": sops-secrets-operator
      - "origin:generated": controller
    pick:
      - cel: 'entity.spec.secretTemplates.map(t, refBuilder().outgoing(id("v1/Secret", ns, t.name)))'
        label: sops
        reverse: true
  - predicate: 'gvk == "isindir.github.com/v1alpha3/SopsSecret"'
    attributes:
      - "origin:app": prod.cluster-infra.sops-secrets-operator
      - "origin:workload": sops-secrets-operator
    pick:
      - cel: '[refBuilder().outgoing(ref("provider", "sops"))]'
