# Test for tags and desc on refs via CEL functions and YAML-level defaults
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-app
  namespace: production
spec:
  template:
    spec:
      containers:
        - name: web
          image: web:latest
          envFrom:
            - secretRef:
                name: db-credentials
---
apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  namespace: production
type: Opaque
data:
  password: cGFzcw==
