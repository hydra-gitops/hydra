# Chain: Deployment -> Secret (clone) -> Secret (original) -> SopsSecret
# Demonstrates cross-app dependency detection via ref-parsers.
# The kyverno ref-parser (in .parsers.yaml) connects clone secrets to the original.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-app
  namespace: demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: my-app
  template:
    metadata:
      labels:
        app: my-app
    spec:
      imagePullSecrets:
        - name: image-pull-secret
      containers:
        - name: app
          image: registry.example.com/my-app:latest
---
apiVersion: v1
kind: Secret
metadata:
  name: image-pull-secret
  namespace: demo
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: eyJhdXRocyI6e319
---
apiVersion: v1
kind: Secret
metadata:
  name: image-pull-secret
  namespace: sops-secrets-operator
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: eyJhdXRocyI6e319
---
apiVersion: isindir.github.com/v1alpha3
kind: SopsSecret
metadata:
  name: image-pull-secret
  namespace: sops-secrets-operator
spec:
  secretTemplates:
    - name: image-pull-secret
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: ENC[AES256_GCM,data:example]
