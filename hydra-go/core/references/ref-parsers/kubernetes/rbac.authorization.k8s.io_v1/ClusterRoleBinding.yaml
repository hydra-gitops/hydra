ref-parsers:
  # ClusterRoleBinding -> ClusterRole
  - gvk: rbac.authorization.k8s.io/v1/ClusterRoleBinding
    label: roleRef
    pick:
      - cel: "[refBuilder().outgoing(id('rbac.authorization.k8s.io/v1/ClusterRole', '', entity.roleRef.name))]"

  # ClusterRoleBinding -> ServiceAccount (subjects)
  - gvk: rbac.authorization.k8s.io/v1/ClusterRoleBinding
    pick:
      - cel: "entity.subjects.filter(s, s.kind == 'ServiceAccount').map(s, refBuilder().outgoing(id('v1/ServiceAccount', s.namespace, s.name)))"
        label: subject
        reverse: true
