ref-parsers:
  - gvk: v1/ServiceAccount
    pick:
      # ServiceAccount -> Secret (imagePullSecrets)
      - cel: "entity.imagePullSecrets.map(ips, refBuilder().outgoing(id('v1/Secret', ns, ips.name)))"
        label: imagePullSecret
      # ServiceAccount -> Secret (secrets - deprecated but still in API)
      - cel: "entity.secrets.map(s, refBuilder().outgoing(id('v1/Secret', ns, s.name)))"
        label: secret
