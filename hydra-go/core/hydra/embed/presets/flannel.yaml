id: flannel
defaultEnabled: false
activates:
  - '!canal'
predicates:
  daemonset:
    ids:
      - 'apps/v1/DaemonSet/kube-system/kube-flannel'
  configmap:
    ids:
      - 'v1/ConfigMap/kube-system/kube-flannel-cfg'
  serviceaccount:
    ids:
      - 'v1/ServiceAccount/kube-system/flannel'
  rbac:
    ids:
      - 'rbac.authorization.k8s.io/v1/ClusterRole//flannel'
      - 'rbac.authorization.k8s.io/v1/ClusterRoleBinding//flannel'
