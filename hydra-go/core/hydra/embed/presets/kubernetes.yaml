      - 'v1/ServiceAccount/kube-system/daemon-set-controller'
      - 'v1/ServiceAccount/kube-system/default'
      - 'v1/ServiceAccount/kube-system/deployment-controller'
      - 'v1/ServiceAccount/kube-system/disruption-controller'
      - 'v1/ServiceAccount/kube-system/endpoint-controller'
      - 'v1/ServiceAccount/kube-system/endpointslice-controller'
      - 'v1/ServiceAccount/kube-system/endpointslicemirroring-controller'
      - 'v1/ServiceAccount/kube-system/ephemeral-volume-controller'
      - 'v1/ServiceAccount/kube-system/expand-controller'
      - 'v1/ServiceAccount/kube-system/generic-garbage-collector'
      - 'v1/ServiceAccount/kube-system/horizontal-pod-autoscaler'
      - 'v1/ServiceAccount/kube-system/job-controller'
      - 'v1/ServiceAccount/kube-system/legacy-service-account-token-cleaner'
      - 'v1/ServiceAccount/kube-system/namespace-controller'
      - 'v1/ServiceAccount/kube-system/node-controller'
      - 'v1/ServiceAccount/kube-system/persistent-volume-binder'
      - 'v1/ServiceAccount/kube-system/pod-garbage-collector'
      - 'v1/ServiceAccount/kube-system/pv-protection-controller'
      - 'v1/ServiceAccount/kube-system/pvc-protection-controller'
      - 'v1/ServiceAccount/kube-system/replicaset-controller'
      - 'v1/ServiceAccount/kube-system/replication-controller'
      - 'v1/ServiceAccount/kube-system/resourcequota-controller'
      - 'v1/ServiceAccount/kube-system/root-ca-cert-publisher'
      - id: 'v1/ServiceAccount/kube-system/bootstrap-signer'
        optional: true
      - 'v1/ServiceAccount/kube-system/service-account-controller'
      - id: 'v1/ServiceAccount/kube-system/service-controller'
        optional: true
      - 'v1/ServiceAccount/kube-system/service-cidrs-controller'
      - 'v1/ServiceAccount/kube-system/statefulset-controller'
      - 'v1/ServiceAccount/kube-system/token-cleaner'
      - 'v1/ServiceAccount/kube-system/ttl-after-finished-controller'
