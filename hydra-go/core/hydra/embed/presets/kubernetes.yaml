      - 'rbac.authorization.k8s.io/v1/ClusterRoleBinding//system:volume-scheduler'
      - 'rbac.authorization.k8s.io/v1/Role/kube-public/system:controller:bootstrap-signer'
      - 'rbac.authorization.k8s.io/v1/Role/kube-system/extension-apiserver-authentication-reader'
      - 'rbac.authorization.k8s.io/v1/Role/kube-system/system:controller:bootstrap-signer'
      - 'rbac.authorization.k8s.io/v1/Role/kube-system/system:controller:cloud-provider'
      - 'rbac.authorization.k8s.io/v1/Role/kube-system/system:controller:token-cleaner'
      - 'v1/ConfigMap/kube-node-lease/kube-root-ca.crt'
      - 'v1/ConfigMap/kube-public/kube-root-ca.crt'
      - 'v1/ConfigMap/kube-system/kube-root-ca.crt'
      - 'v1/Service/default/kubernetes'

  bootstrap-audit-m29:
    kubernetesMinorMin: 29
    ids:
      - 'rbac.authorization.k8s.io/v1/ClusterRole//system:controller:service-cidrs-controller'
      - 'rbac.authorization.k8s.io/v1/ClusterRoleBinding//system:controller:service-cidrs-controller'

  # Selinux warning controller bootstrap RBAC: Kubernetes 1.33+ (not in 1.32).
  bootstrap-audit-m33:
    kubernetesMinorMin: 33
    ids:
      - 'rbac.authorization.k8s.io/v1/ClusterRole//system:controller:selinux-warning-controller'
      - 'rbac.authorization.k8s.io/v1/ClusterRoleBinding//system:controller:selinux-warning-controller'

  # DRA device-taint eviction controller (separate SA + bootstrap RBAC): Kubernetes 1.36+.
  bootstrap-audit-m36:
    kubernetesMinorMin: 36
    ids:
      - 'rbac.authorization.k8s.io/v1/ClusterRole//system:controller:device-taint-eviction-controller'
      - 'rbac.authorization.k8s.io/v1/ClusterRoleBinding//system:controller:device-taint-eviction-controller'

  apiserver-leases:
    cel:
      - gvk: coordination.k8s.io/v1/Lease
        namespace: kube-system
        cel: 'name.matches("^apiserver-.+")'
  kube-root-ca-configmap:
    cel:
      - gvk: v1/ConfigMap
        name: kube-root-ca.crt
        cel: 'ns != "cloud-init-settings"'
  rbac-rolebindings:
    ids:
      - 'rbac.authorization.k8s.io/v1/RoleBinding/kube-public/system:controller:bootstrap-signer'
      - 'rbac.authorization.k8s.io/v1/RoleBinding/kube-system/system::extension-apiserver-authentication-reader'
      - 'rbac.authorization.k8s.io/v1/RoleBinding/kube-system/system:controller:bootstrap-signer'
      - 'rbac.authorization.k8s.io/v1/RoleBinding/kube-system/system:controller:cloud-provider'
      - 'rbac.authorization.k8s.io/v1/RoleBinding/kube-system/system:controller:token-cleaner'
  # Flowcontrol, service discovery, networking, scheduling, and core API extension machinery not owned by
  # Canal/Kubermatic/CSI/Quobyte. Keep APIService/CRD CELs disjoint from those presets (1:1 assignment in tests).
  control-plane-aggregation:
    cel:
      - gvk: flowcontrol.apiserver.k8s.io/v1/FlowSchema
      - gvk: flowcontrol.apiserver.k8s.io/v1/PriorityLevelConfiguration
      - gvk: discovery.k8s.io/v1/EndpointSlice
        namespace: default
        name: kubernetes
      - gvk: networking.k8s.io/v1/IPAddress
      - gvk: networking.k8s.io/v1/ServiceCIDR
      - gvk: scheduling.k8s.io/v1/PriorityClass
  # Built-in/default APIServices owned by the cluster control plane. Distribution or addon APIServices must be
  # listed in their own presets so matching stays explicit and 1:1 in golden tests.
  apiregistration-cluster-services:
    ids:
      - 'apiregistration.k8s.io/v1/APIService//v1.'
      - 'apiregistration.k8s.io/v1/APIService//v1.admissionregistration.k8s.io'
      - 'apiregistration.k8s.io/v1/APIService//v1.apiextensions.k8s.io'
      - 'apiregistration.k8s.io/v1/APIService//v1.apps'
      - 'apiregistration.k8s.io/v1/APIService//v1.authentication.k8s.io'
      - 'apiregistration.k8s.io/v1/APIService//v1.authorization.k8s.io'
      - 'apiregistration.k8s.io/v1/APIService//v1.autoscaling'
      - 'apiregistration.k8s.io/v1/APIService//v1.batch'
      - 'apiregistration.k8s.io/v1/APIService//v1.certificates.k8s.io'
      - 'apiregistration.k8s.io/v1/APIService//v1.coordination.k8s.io'
      - 'apiregistration.k8s.io/v1/APIService//v1.discovery.k8s.io'
      - 'apiregistration.k8s.io/v1/APIService//v1.events.k8s.io'
      - 'apiregistration.k8s.io/v1/APIService//v1.flowcontrol.apiserver.k8s.io'
      - 'apiregistration.k8s.io/v1/APIService//v1.networking.k8s.io'
      - 'apiregistration.k8s.io/v1/APIService//v1.node.k8s.io'
      - 'apiregistration.k8s.io/v1/APIService//v1.policy'
      - 'apiregistration.k8s.io/v1/APIService//v1.rbac.authorization.k8s.io'
      - id: 'apiregistration.k8s.io/v1/APIService//v1.resource.k8s.io'
        optional: true
      - 'apiregistration.k8s.io/v1/APIService//v1.scheduling.k8s.io'
      - 'apiregistration.k8s.io/v1/APIService//v1.storage.k8s.io'
      - id: 'apiregistration.k8s.io/v1/APIService//v1alpha1.policy.networking.k8s.io'
        optional: true
      - 'apiregistration.k8s.io/v1/APIService//v2.autoscaling'
  configmaps-infra:
    ids:
      - 'v1/ConfigMap/kube-system/extension-apiserver-authentication'
      - 'v1/ConfigMap/kube-system/kube-apiserver-legacy-service-account-token-tracking'
  kube-system-serviceaccounts:
    ids:
      - 'v1/ServiceAccount/kube-system/attachdetach-controller'
      - 'v1/ServiceAccount/kube-system/certificate-controller'
      - 'v1/ServiceAccount/kube-system/clusterrole-aggregation-controller'
