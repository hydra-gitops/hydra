# Builtin cluster-defaults preset: OpenStack Cinder CSI common resources and Gardener/OpenStack naming.
id: cinder
defaultEnabled: false
activates:
  - cinder-controller
predicates:
  daemonset:
    ids:
      - id: 'apps/v1/DaemonSet/kube-system/csi-driver-node'
        optional: true
  csi-nodeplugin-workloads:
    ids:
      - id: 'apps/v1/DaemonSet/kube-system/csi-driver-node'
        optional: true
      - id: 'v1/ServiceAccount/kube-system/csi-driver-node'
        optional: true
    cel:
      - gvk: metrics.k8s.io/v1beta1/PodMetrics
        namespace: kube-system
        cel: 'name.matches("^csi-driver-node-.*")'
        optional: true
  csi-controller-rbac:
    ids:
      - id: 'rbac.authorization.k8s.io/v1/ClusterRole//extensions.gardener.cloud:provider-openstack:csi-attacher'
        optional: true
      - id: 'rbac.authorization.k8s.io/v1/ClusterRole//extensions.gardener.cloud:provider-openstack:csi-driver'
        optional: true
      - id: 'rbac.authorization.k8s.io/v1/ClusterRole//extensions.gardener.cloud:provider-openstack:csi-provisioner'
        optional: true
      - id: 'rbac.authorization.k8s.io/v1/ClusterRole//extensions.gardener.cloud:provider-openstack:csi-resizer'
        optional: true
      - id: 'rbac.authorization.k8s.io/v1/ClusterRole//extensions.gardener.cloud:provider-openstack:csi-snapshot-controller'
        optional: true
      - id: 'rbac.authorization.k8s.io/v1/ClusterRole//extensions.gardener.cloud:provider-openstack:csi-snapshotter'
        optional: true
      - id: 'rbac.authorization.k8s.io/v1/ClusterRoleBinding//extensions.gardener.cloud:provider-openstack:csi-attacher'
        optional: true
      - id: 'rbac.authorization.k8s.io/v1/ClusterRoleBinding//extensions.gardener.cloud:provider-openstack:csi-driver'
        optional: true
      - id: 'rbac.authorization.k8s.io/v1/ClusterRoleBinding//extensions.gardener.cloud:provider-openstack:csi-provisioner'
        optional: true
      - id: 'rbac.authorization.k8s.io/v1/ClusterRoleBinding//extensions.gardener.cloud:provider-openstack:csi-resizer'
        optional: true
      - id: 'rbac.authorization.k8s.io/v1/ClusterRoleBinding//extensions.gardener.cloud:provider-openstack:csi-snapshot-controller'
        optional: true
      - id: 'rbac.authorization.k8s.io/v1/ClusterRoleBinding//extensions.gardener.cloud:provider-openstack:csi-snapshotter'
        optional: true
      - id: 'rbac.authorization.k8s.io/v1/Role/kube-system/extensions.gardener.cloud:provider-openstack:csi-attacher'
        optional: true
      - id: 'rbac.authorization.k8s.io/v1/Role/kube-system/extensions.gardener.cloud:provider-openstack:csi-provisioner'
        optional: true
      - id: 'rbac.authorization.k8s.io/v1/Role/kube-system/extensions.gardener.cloud:provider-openstack:csi-resizer'
        optional: true
      - id: 'rbac.authorization.k8s.io/v1/Role/kube-system/extensions.gardener.cloud:provider-openstack:csi-snapshot-controller'
        optional: true
      - id: 'rbac.authorization.k8s.io/v1/Role/kube-system/extensions.gardener.cloud:provider-openstack:csi-snapshotter'
        optional: true
      - id: 'rbac.authorization.k8s.io/v1/RoleBinding/kube-system/extensions.gardener.cloud:provider-openstack:csi-attacher'
        optional: true
      - id: 'rbac.authorization.k8s.io/v1/RoleBinding/kube-system/extensions.gardener.cloud:provider-openstack:csi-provisioner'
        optional: true
      - id: 'rbac.authorization.k8s.io/v1/RoleBinding/kube-system/extensions.gardener.cloud:provider-openstack:csi-resizer'
        optional: true
      - id: 'rbac.authorization.k8s.io/v1/RoleBinding/kube-system/extensions.gardener.cloud:provider-openstack:csi-snapshot-controller'
        optional: true
      - id: 'rbac.authorization.k8s.io/v1/RoleBinding/kube-system/extensions.gardener.cloud:provider-openstack:csi-snapshotter'
        optional: true
      - id: 'v1/ServiceAccount/kube-system/csi-attacher'
        optional: true
      - id: 'v1/ServiceAccount/kube-system/csi-provisioner'
        optional: true
      - id: 'v1/ServiceAccount/kube-system/csi-resizer'
        optional: true
      - id: 'v1/ServiceAccount/kube-system/csi-snapshot-controller'
        optional: true
      - id: 'v1/ServiceAccount/kube-system/csi-snapshotter'
        optional: true
  leader-election-leases:
    ids:
      - 'coordination.k8s.io/v1/Lease/kube-system/cinder-csi-openstack-org'
      - 'coordination.k8s.io/v1/Lease/kube-system/external-attacher-leader-cinder-csi-openstack-org'
      - 'coordination.k8s.io/v1/Lease/kube-system/external-resizer-cinder-csi-openstack-org'
      - 'coordination.k8s.io/v1/Lease/kube-system/external-snapshotter-leader-cinder-csi-openstack-org'
      - 'coordination.k8s.io/v1/Lease/kube-system/snapshot-controller-leader'
  csi-driver:
    ids:
      - 'storage.k8s.io/v1/CSIDriver//cinder.csi.openstack.org'
  volume-snapshot-crds:
    ids:
      - 'apiregistration.k8s.io/v1/APIService//v1.snapshot.storage.k8s.io'
      - 'apiextensions.k8s.io/v1/CustomResourceDefinition//volumesnapshotclasses.snapshot.storage.k8s.io'
      - 'apiextensions.k8s.io/v1/CustomResourceDefinition//volumesnapshotcontents.snapshot.storage.k8s.io'
      - 'apiextensions.k8s.io/v1/CustomResourceDefinition//volumesnapshots.snapshot.storage.k8s.io'
  volume-attachments:
    cel:
      - gvk: storage.k8s.io/v1/VolumeAttachment
        cel: 'name.matches("^csi-[a-f0-9]+$")'
        optional: true
