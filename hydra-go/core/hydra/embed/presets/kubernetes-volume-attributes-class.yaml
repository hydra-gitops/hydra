# Builtin Kubernetes VolumeAttributesClass defaults.
# Kubernetes activates this automatically for 1.34+ where VolumeAttributesClass is GA/default-on.
# Clusters on 1.32-1.33 can enable this preset explicitly when the feature gate is enabled.
id: kubernetes-volume-attributes-class
defaultEnabled: false
predicates:
  bootstrap-audit:
    kubernetesMinorMin: 32
    ids:
      - 'rbac.authorization.k8s.io/v1/ClusterRole//system:controller:volumeattributesclass-protection-controller'
      - 'rbac.authorization.k8s.io/v1/ClusterRoleBinding//system:controller:volumeattributesclass-protection-controller'
  kube-system-serviceaccounts:
    kubernetesMinorMin: 32
    ids:
      - 'v1/ServiceAccount/kube-system/volumeattributesclass-protection-controller'
